<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>F1 Stats - Live Formula 1 Dashboard</title>
    <meta name="description" content="Real-time Formula 1 statistics, standings, and session results">
    <link rel="stylesheet" href="assets/css/style.css?t=202603310800">
    <script src="assets/js/app.js?t=202603310800" defer></script>
    <script src="assets/js/poll.js?t=202603310800" defer></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🏎️</span>
                <h1>F1 Stats</h1>
                <span class="beta-badge">beta</span>
                <span class="season-badge" id="season-year">2026 Season</span>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Live Session Banner -->
    <div class="live-banner" id="live-banner" style="display: none;">
        <span class="live-dot"></span>
        <span class="live-text" id="live-text">Session in progress</span>
    </div>

    <main class="main">
        <div class="grid">
            <!-- Next Race -->
            <section class="card race-card" aria-labelledby="next-race-title">
                <h2 id="next-race-title"><span class="icon">📅</span> Next Race</h2>
                <div class="race-header">
                    <div class="race-name" id="next-race-name">Loading...</div>
                    <div class="race-date" id="next-race-date"></div>
                </div>
                <div class="race-circuit" id="next-race-circuit"></div>
                <div class="session-list" id="session-times"></div>
            </section>

            <!-- Driver Standings -->
            <section class="card" aria-labelledby="driver-standings-title">
                <h2 id="driver-standings-title"><span class="icon">🏆</span> Driver Standings</h2>
                <div id="driver-standings" class="standings-list">
                    <div class="loading-skeleton"></div>
                </div>
            </section>

            <!-- Constructor Standings -->
            <section class="card" aria-labelledby="constructor-standings-title">
                <h2 id="constructor-standings-title"><span class="icon">🏭</span> Constructor Standings</h2>
                <div id="constructor-standings" class="standings-list">
                    <div class="loading-skeleton"></div>
                </div>
            </section>

            <!-- Race Winner Poll -->
            <section class="card poll-card" id="poll-container" aria-labelledby="poll-title" style="display: none;">
                <h2 id="poll-title">🏎️ Race Winner Poll</h2>
                <p class="poll-subtitle" id="poll-subtitle">Who will win?</p>
                <div id="poll-vote" class="poll-vote-area">
                    <!-- Voting options rendered here -->
                </div>
                <div id="poll-results" class="poll-results-area" style="display: none;">
                    <!-- Results rendered here -->
                </div>
            </section>

            <!-- Latest Results -->
            <section class="card" aria-labelledby="latest-results-title">
                <h2 id="latest-results-title"><span class="icon">🏁</span> Latest Results</h2>
                <div class="results-header" id="results-header"></div>
                <table class="results-table" aria-label="Latest session results">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Driver</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="latest-results">
                        <tr><td colspan="3" class="loading-cell">Loading...</td></tr>
                    </tbody>
                </table>
            </section>

            <!-- Weather (Live during sessions) -->
            <section class="card weather-card" id="weather-card" aria-labelledby="weather-title" style="display: none;">
                <h2 id="weather-title"><span class="icon">🌦️</span> Track Weather</h2>
                <div id="weather-content" class="weather-grid">
                    <div class="loading-skeleton"></div>
                </div>
            </section>

            <!-- Pit Stops (Live during race) -->
            <section class="card pitstops-card" id="pitstops-card" aria-labelledby="pitstops-title" style="display: none;">
                <h2 id="pitstops-title"><span class="icon">🛞</span> Pit Stops</h2>
                <table class="results-table" aria-label="Pit stop times">
                    <thead>
                        <tr>
                            <th>Lap</th>
                            <th>Driver</th>
                            <th>Time</th>
                            <th>Tire</th>
                        </tr>
                    </thead>
                    <tbody id="pitstops-results">
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 F1 Stats</p>
    </footer>

    <script>
        // Theme handling
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('.theme-icon');
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('f1-theme', theme);
        }
        
        // Initialize theme
        const savedTheme = localStorage.getItem('f1-theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>

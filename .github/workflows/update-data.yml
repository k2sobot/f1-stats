name: Update F1 Data

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Manual trigger
  push:
    branches: [master]
    paths:
      - '.github/workflows/update-data.yml'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Fetch F1 Data
        run: |
          mkdir -p docs/data
          
          # Fetch driver standings
          curl -s "https://api.jolpi.ca/ergast/f1/2026/driverStandings.json" -o docs/data/drivers.json
          
          # Fetch constructor standings
          curl -s "https://api.jolpi.ca/ergast/f1/2026/constructorStandings.json" -o docs/data/constructors.json
          
          # Fetch race schedule
          curl -s "https://api.jolpi.ca/ergast/f1/2026.json" -o docs/data/schedule.json
          
          # Fetch latest race results
          ROUND=$(cat docs/data/drivers.json | jq -r '.MRData.StandingsTable.StandingsLists[0].round')
          if [ "$ROUND" -gt 0 ]; then
            curl -s "https://api.jolpi.ca/ergast/f1/2026/$ROUND/results.json" -o docs/data/results.json
          fi
          
          echo "Data fetched successfully"
      
      - name: Check for changes
        id: check
        run: |
          git diff --exit-code docs/data/ || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/
          git commit -m "Update F1 data [skip ci]"
          git push

name: Fetch F1 Live Data

on:
  schedule:
    # Every 30 minutes during typical race hours (Fridays-Sundays)
    - cron: '0,30 12-22 * * 5,6,0'  # UTC: Fri-Sun, 12:00-22:00
  workflow_dispatch:  # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Fetch live data
        run: node scripts/fetch-live.js
      
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/data/live/ || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/live/
          git commit -m "chore: update live F1 data [skip ci]"
          git push
